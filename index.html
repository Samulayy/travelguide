<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Guide</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <h1 class="logo">Travel Guide</h1>
    <p class="tagline">Carnet de voyage</p>
  </header>

  <div class="layout">
    <section class="map-section" aria-label="Carte du voyage">
      <div id="map"></div>
    </section>

    <aside class="panel" id="panel" aria-label="Détail de l'étape">
      <div class="panel-placeholder" id="panel-placeholder">
        <p class="panel-hint">Cliquez sur un point de la carte ou choisissez une étape ci-dessous.</p>
        <ol class="step-list" id="step-list"></ol>
      </div>
      <article class="panel-detail hidden" id="panel-detail">
        <button class="panel-back" id="panel-back" type="button" aria-label="Retour à la liste">
          ← Toutes les étapes
        </button>
        <header class="detail-header">
          <time class="detail-date" id="detail-date"></time>
          <h2 class="detail-title" id="detail-title"></h2>
        </header>
        <div class="detail-text" id="detail-text"></div>
        <div class="detail-photos" id="detail-photos"></div>
      </article>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="js/app.js"></script>
</body>
</html>
